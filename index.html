<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>NSDraw</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <script>
    // ── Examples — add new entries here ──
    const EXAMPLES = [
      '001-hello-world.js',
      '002-colors.js',
      '003-squares.js',
      '004-loops.js',
      '005-mouse.js',
      '006-drawing.js',
      '007-trail.js',
      '008-circles.js',
      '009-clock.js',
      '010-grid.js',
      '011-tree.js',
    ];
  </script>

  <!-- Toolbar -->
  <div id="toolbar">
    <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
    <span class="logo">NSDraw</span>
    <button id="play-btn">▶ Run</button>
  </div>

  <!-- Sidebar backdrop (mobile) -->
  <div id="sidebar-backdrop"></div>

  <!-- Main -->
  <div id="main">

    <!-- Sidebar -->
    <div id="sidebar">

      <!-- Examples folder (populated from EXAMPLES array in script) -->
      <div class="tree-section">
        <div class="tree-folder-header" id="examples-header">
          <span class="arrow">▾</span>
          <span>examples</span>
        </div>
        <div class="tree-folder-content" id="examples-content"></div>
      </div>

      <!-- My files folder -->
      <div class="tree-section">
        <div class="tree-folder-header" id="myfiles-header">
          <span class="arrow">▾</span>
          <span>my files</span>
          <div class="folder-actions">
            <button class="folder-action-btn" id="upload-file-btn" title="Upload file">↑</button>
            <button class="folder-action-btn" id="new-file-btn" title="New file">+</button>
          </div>
          <input type="file" id="upload-file-input" accept=".js" style="display:none">
        </div>
        <div class="tree-folder-content" id="myfiles-content">
          <!-- user file rows rendered here -->
        </div>
      </div>

    </div>

    <!-- Editor -->
    <div id="editor-pane">
      <div id="ace-editor"></div>
    </div>

  </div>

  <!-- Runner overlay -->
  <div id="runner-overlay" class="hidden">
    <button id="close-btn">✕ Close</button>
    <iframe id="runner-frame" sandbox="allow-scripts"></iframe>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.0/ace.js"></script>
  <script>
    // ── Ace editor setup ──
    const editor = ace.edit('ace-editor');
    editor.setTheme('ace/theme/monokai');
    editor.session.setMode('ace/mode/javascript');
    editor.setOptions({
      fontSize: '14px',
      showPrintMargin: false,
      tabSize: 2,
      useSoftTabs: true,
    });

    const DEFAULT_CODE = ``;

    editor.setValue(DEFAULT_CODE, -1);

    // ── NSDraw library source (fetched once) ──
    let nsdrawSrc = '';
    fetch('nsdraw.js').then(r => r.text()).then(src => { nsdrawSrc = src; });

    // ── File system state ──
    let userFiles = JSON.parse(localStorage.getItem('nsdraw_files') || '{}');
    let currentKey = null; // key of open file

    function isExample(key) { return key.startsWith('examples/'); }

    function saveUserFiles() {
      localStorage.setItem('nsdraw_files', JSON.stringify(userFiles));
    }

    // ── Auto-save on editor change ──
    editor.session.on('change', () => {
      if (currentKey && !isExample(currentKey)) {
        userFiles[currentKey] = editor.getValue();
        saveUserFiles();
      }
    });

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Shared file-row renderer ──
    function makeFileRow(key, name, deletable) {
      const row = document.createElement('div');
      row.className = 'tree-file';
      row.dataset.key = key;
      if (key === currentKey) row.classList.add('active');
      row.innerHTML = `<span class="file-icon">○</span><span class="file-name">${escapeHtml(name)}</span>`
        + (deletable ? `<button class="download-btn" title="Download">↓</button><button class="delete-btn" title="Delete">×</button>` : '');
      row.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-btn')) return;
        if (e.target.classList.contains('download-btn')) return;
        openFile(key);
      });
      if (deletable) {
        row.querySelector('.download-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          downloadFile(key);
        });
        row.querySelector('.delete-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteFile(key);
        });
      }
      return row;
    }

    // ── Sidebar toggle ──
    const sidebarEl   = document.getElementById('sidebar');
    const backdropEl  = document.getElementById('sidebar-backdrop');
    const toggleBtn   = document.getElementById('sidebar-toggle');

    function isMobile() { return window.innerWidth < 640; }

    function openSidebar() {
      if (isMobile()) {
        sidebarEl.classList.add('open');
        backdropEl.classList.add('visible');
      } else {
        sidebarEl.classList.remove('closed');
      }
    }
    function closeSidebar() {
      if (isMobile()) {
        sidebarEl.classList.remove('open');
        backdropEl.classList.remove('visible');
      } else {
        sidebarEl.classList.add('closed');
      }
    }
    function toggleSidebar() {
      const isOpen = isMobile()
        ? sidebarEl.classList.contains('open')
        : !sidebarEl.classList.contains('closed');
      isOpen ? closeSidebar() : openSidebar();
    }

    toggleBtn.addEventListener('click', toggleSidebar);
    backdropEl.addEventListener('click', closeSidebar);

    // ── Open any file ──
    function openFile(key) {
      if (isExample(key)) {
        fetch(key).then(r => r.text()).then(src => {
          currentKey = key;
          editor.setValue(src, -1);
          renderSidebar();
          if (isMobile()) closeSidebar();
        });
      } else {
        currentKey = key;
        editor.setValue(userFiles[key] ?? '', -1);
        renderSidebar();
        if (isMobile()) closeSidebar();
      }
    }

    // ── Delete a user file ──
    function deleteFile(key) {
      if (!confirm(`Delete "${key}"?`)) return;
      delete userFiles[key];
      saveUserFiles();
      if (currentKey === key) { currentKey = null; editor.setValue('', -1); }
      renderSidebar();
    }

    // ── Download a user file ──
    function downloadFile(key) {
      const content = userFiles[key] ?? '';
      const blob = new Blob([content], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = key;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── Render both folders ──
    function renderSidebar() {
      // Examples
      const exContainer = document.getElementById('examples-content');
      exContainer.innerHTML = '';
      for (const file of EXAMPLES) {
        exContainer.appendChild(makeFileRow(`examples/${file}`, file, false));
      }

      // My files
      const myContainer = document.getElementById('myfiles-content');
      const existingInput = myContainer.querySelector('.new-file-row');
      myContainer.querySelectorAll('.tree-file').forEach(el => el.remove());
      for (const name of Object.keys(userFiles).sort()) {
        const row = makeFileRow(name, name, true);
        myContainer.insertBefore(row, existingInput ?? null);
      }
    }

    // ── Upload file ──
    document.getElementById('upload-file-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('upload-file-input').click();
    });

    document.getElementById('upload-file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      e.target.value = '';
      let name = file.name;
      if (!name.endsWith('.js')) name += '.js';
      const reader = new FileReader();
      reader.onload = (ev) => {
        userFiles[name] = ev.target.result;
        saveUserFiles();
        openFile(name);
      };
      reader.readAsText(file);
    });

    // ── New file: inline input ──
    document.getElementById('new-file-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const container = document.getElementById('myfiles-content');
      if (container.querySelector('.new-file-row')) return;

      container.classList.remove('collapsed');
      document.getElementById('myfiles-header').classList.remove('collapsed');

      const row = document.createElement('div');
      row.className = 'new-file-row';
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'new-file-input';
      input.placeholder = 'filename.js';
      row.appendChild(input);
      container.appendChild(row);
      input.focus();

      function commit() {
        let name = input.value.trim();
        row.remove();
        if (!name) return;
        if (!name.endsWith('.js')) name += '.js';
        if (userFiles[name] === undefined) { userFiles[name] = ''; saveUserFiles(); }
        openFile(name);
      }

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter')  commit();
        if (e.key === 'Escape') row.remove();
      });
      input.addEventListener('blur', () => {
        setTimeout(() => { if (row.parentNode) row.remove(); }, 150);
      });
    });

    // ── Folder collapse toggles ──
    document.getElementById('examples-header').addEventListener('click', () => {
      document.getElementById('examples-header').classList.toggle('collapsed');
      document.getElementById('examples-content').classList.toggle('collapsed');
    });

    document.getElementById('myfiles-header').addEventListener('click', (e) => {
      if (e.target.closest('.folder-actions')) return;
      document.getElementById('myfiles-header').classList.toggle('collapsed');
      document.getElementById('myfiles-content').classList.toggle('collapsed');
    });

    // ── Initial render ──
    renderSidebar();
    openFile('examples/001-hello-world.js');

    // ── Play button ──
    const playBtn       = document.getElementById('play-btn');
    const runnerOverlay = document.getElementById('runner-overlay');
    const runnerFrame   = document.getElementById('runner-frame');
    const closeBtn      = document.getElementById('close-btn');

    playBtn.addEventListener('click', () => {
      const userCode = editor.getValue();

      const doc = `<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
  #error-bar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #f38ba8;
    color: #1e1e2e;
    padding: 8px 12px;
    font-family: monospace;
    font-size: 13px;
    z-index: 999;
  }
</style>
</head>
<body>
<canvas id="nsdraw-canvas"></canvas>
<div id="error-bar"></div>
<script>
window.onerror = function(msg, _src, line) {
  const bar = document.getElementById('error-bar');
  bar.style.display = 'block';
  bar.textContent = 'Error (line ' + line + '): ' + msg;
};
<\/script>
<script>
${nsdrawSrc}
<\/script>
<script>
${userCode}
<\/script>
</body>
</html>`;

      runnerFrame.srcdoc = doc;
      runnerOverlay.classList.remove('hidden');
    });

    function closeRunner() {
      runnerOverlay.classList.add('hidden');
      runnerFrame.srcdoc = '';
    }

    closeBtn.addEventListener('click', closeRunner);

    document.addEventListener('keydown', (e) => {
      if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
      }
      if (e.key === 'Escape' && !runnerOverlay.classList.contains('hidden')) {
        closeRunner();
      }
    });
  </script>
</body>
</html>
